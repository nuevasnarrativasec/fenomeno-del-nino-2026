<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>El Niño — Impacto Global de Temperatura</title>
  <script src="https://unpkg.com/maplibre-gl@4.1.3/dist/maplibre-gl.js"></script>
  <link href="https://unpkg.com/maplibre-gl@4.1.3/dist/maplibre-gl.css" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', serif;
      background: #0d1117;
      color: #e8e0d5;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── HEADER / SLIDER ── */
    header {
      padding: 18px 40px 16px;
      border-bottom: 1px solid #1e1e2e;
      background: #0d1117;
      z-index: 10;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 14px;
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: normal;
      letter-spacing: 0.02em;
      color: #f0e8df;
    }

    .intensity-badge {
      font-family: sans-serif;
      font-size: 0.78rem;
      color: #e09070;
      background: #1a1020;
      border: 1px solid #3a2030;
      padding: 3px 10px;
      border-radius: 12px;
      letter-spacing: 0.05em;
    }

    /* Slider container */
    .slider-wrap {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .slider-track-wrap {
      position: relative;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .slider-label-left,
    .slider-label-right {
      font-family: sans-serif;
      font-size: 0.72rem;
      color: #6a6070;
      white-space: nowrap;
      flex-shrink: 0;
    }

    input[type="range"] {
      -webkit-appearance: none;
      flex: 1;
      height: 4px;
      border-radius: 2px;
      background: linear-gradient(to right,
        #003cc8 0%,
        #148ce6 15%,
        #f5f5f5 35%,
        #ffd21e 52%,
        #ff8200 65%,
        #fa1e0a 80%,
        #780050 100%
      );
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #ffffff;
      border: 2px solid #e05c2a;
      box-shadow: 0 0 6px rgba(224,92,42,0.5);
      cursor: pointer;
      transition: box-shadow 0.15s;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      box-shadow: 0 0 12px rgba(224,92,42,0.8);
    }

    /* Tick marks */
    .slider-ticks {
      display: flex;
      padding: 0 30px 0 108px;
      justify-content: space-between;
    }

    .slider-tick {
      font-family: sans-serif;
      font-size: 0.65rem;
      color: #4a4055;
      text-align: center;
      flex: 1;
    }

    .slider-tick.active {
      color: #c0a090;
    }

    /* ── MAPA ── */
    #map { flex: 1; }

    /* ── TOOLTIP DE PAÍS ── */
    #tooltip {
      position: absolute;
      bottom: 28px;
      left: 28px;
      background: rgba(13,17,23,0.92);
      border: 1px solid #2a2a3a;
      border-radius: 8px;
      padding: 12px 16px;
      pointer-events: none;
      z-index: 20;
      min-width: 180px;
      display: none;
    }

    #tooltip .country-name {
      font-size: 0.95rem;
      color: #f0e8df;
      margin-bottom: 2px;
    }

    #tooltip .country-anomaly {
      font-size: 1.5rem;
      font-family: sans-serif;
      font-weight: 700;
    }

    #tooltip .country-note {
      font-size: 0.7rem;
      font-family: sans-serif;
      color: #7a7080;
      margin-top: 3px;
      line-height: 1.4;
    }

    /* ── LEYENDA ── */
    #legend {
      position: absolute;
      bottom: 28px;
      right: 28px;
      background: rgba(13,17,23,0.88);
      border: 1px solid #2a2a3a;
      border-radius: 8px;
      padding: 12px 14px;
      z-index: 20;
      width: 200px;
    }

    #legend .leg-title {
      font-family: sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #6a6070;
      margin-bottom: 8px;
    }

    .leg-bar {
      height: 10px;
      border-radius: 3px;
      background: linear-gradient(to right,
        #003cc8, #148ce6, #6ec8fa,
        #f5f5f5,
        #fffaa0, #ffd21e, #ff8200, #fa1e0a, #c80028, #780050
      );
      margin-bottom: 4px;
    }

    .leg-labels {
      display: flex;
      justify-content: space-between;
      font-family: sans-serif;
      font-size: 0.62rem;
      color: #6a6070;
    }

    /* ── SPINNER ── */
    #loading {
      position: absolute;
      inset: 0;
      background: #0d1117;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      font-family: sans-serif;
      font-size: 0.85rem;
      color: #6a6070;
      flex-direction: column;
      gap: 10px;
    }

    .spinner {
      width: 26px; height: 26px;
      border: 2px solid #2a2a3a;
      border-top-color: #e05c2a;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="loading"><div class="spinner"></div>Cargando mapa…</div>

<header>
  <div class="header-top">
    <h1>Fenómeno El Niño — Impacto Global de Temperatura</h1>
    <span class="intensity-badge" id="intensityBadge">Normal — sin anomalía</span>
  </div>

  <div class="slider-wrap">
    <div class="slider-track-wrap">
      <span class="slider-label-left">Temperatura normal</span>
      <input type="range" id="intensitySlider" min="0" max="100" value="0" step="1" />
      <span class="slider-label-right">El Niño extraordinario</span>
    </div>
    <div class="slider-ticks" id="sliderTicks"></div>
  </div>
</header>

<div id="map"></div>

<div id="tooltip">
  <div class="country-name" id="ttName">—</div>
  <div class="country-anomaly" id="ttAnomaly">—</div>
  <div class="country-note" id="ttNote">—</div>
</div>

<div id="legend">
  <div class="leg-title">Anomalía de temperatura (°C)</div>
  <div class="leg-bar"></div>
  <div class="leg-labels">
    <span>−2</span><span>0</span><span>+2</span><span>+4</span><span>+5</span>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
// DATOS: anomalía base por país (ISO A3) a intensidad máxima
// Fuente: patrones históricos El Niño 1982–83, 1997–98, 2015–16
// Positivo = calentamiento, Negativo = enfriamiento
// ─────────────────────────────────────────────
const BASE_ANOMALY = {
  // SUDAMÉRICA — costa pacífica: máximo calentamiento
  PER:  4.5, ECU:  3.5, COL:  2.0, CHL:  1.5,
  BOL:  0.8, VEN:  1.0, BRA:  1.8, ARG:  0.8,
  URY:  0.6, PRY:  0.5, GUY:  0.7, SUR:  0.7,
  // CENTROAMÉRICA Y CARIBE
  MEX:  1.2, GTM:  1.0, BLZ:  0.8, HND:  1.0,
  SLV:  1.0, NIC:  1.0, CRI:  0.8, PAN:  0.8,
  CUB:  0.5, DOM:  0.5, JAM:  0.5, HTI:  0.5,
  TTO:  0.6, BRB:  0.5,
  // NORTEAMÉRICA
  USA:  0.8, CAN:  0.5, GRL:  0.3,
  // EUROPA — leve calentamiento
  GBR:  0.4, IRL:  0.4, FRA:  0.3, ESP:  0.5,
  PRT:  0.6, DEU:  0.3, NLD:  0.3, BEL:  0.3,
  CHE:  0.3, AUT:  0.3, ITA:  0.4, GRC:  0.4,
  NOR:  0.4, SWE:  0.3, FIN:  0.3, DNK:  0.3,
  POL:  0.3, CZE:  0.3, SVK:  0.3, HUN:  0.3,
  ROU:  0.3, BGR:  0.3, HRV:  0.3, SRB:  0.3,
  UKR:  0.2, BLR:  0.2, RUS:  0.3,
  // ORIENTE MEDIO
  TUR:  0.3, SYR:  0.3, IRQ:  0.4, IRN:  0.3,
  SAU:  0.6, YEM:  0.6, OMN:  0.5, ARE:  0.5,
  QAT:  0.5, KWT:  0.5, JOR:  0.4, ISR:  0.3,
  LBN:  0.3, AFG:  0.2, PAK: -0.2,
  // ASIA CENTRAL Y DEL SUR
  KAZ:  0.2, UZB:  0.2, TKM:  0.2, KGZ:  0.2,
  TJK:  0.2, IND: -0.4, BGD: -0.3, LKA: -0.4,
  NPL: -0.2, BTN: -0.2, MDV: -0.2,
  // ASIA ORIENTAL — leve calentamiento
  CHN:  0.3, MNG:  0.2, JPN:  0.2, KOR:  0.2,
  PRK:  0.1, TWN:  0.1,
  // SUDESTE ASIÁTICO — enfriamiento por seco
  MMR: -0.4, THA: -0.5, VNM: -0.5, KHM: -0.5,
  LAO: -0.4, MYS: -0.8, SGP: -0.6, BRN: -0.6,
  IDN: -1.2, PHL: -1.0, TLS: -1.0,
  // OCEANÍA — fuerte enfriamiento / sequía
  AUS: -1.5, PNG: -1.2, NZL: -0.3,
  FJI: -0.5, SLB: -0.8, VUT: -0.6,
  // AFRICA DEL NORTE / SAHEL — leve calentamiento
  MAR:  0.4, DZA:  0.3, TUN:  0.3, LBY:  0.3,
  EGY:  0.4, SDN:  0.8, SSD:  0.8,
  MRT:  0.5, MLI:  0.5, NER:  0.5, TCD:  0.5,
  BFA:  0.5, SEN:  0.5, GMB:  0.5, GNB:  0.4,
  GIN:  0.4, SLE:  0.4, LBR:  0.4, CIV:  0.5,
  GHA:  0.5, TGO:  0.5, BEN:  0.5, NGA:  0.5,
  CMR:  0.4, CAF:  0.5, GNQ:  0.3, GAB:  0.3,
  COG:  0.3, COD:  0.3,
  // AFRICA DEL ESTE — calentamiento
  ETH:  1.5, ERI:  1.0, DJI:  1.0, SOM:  1.2,
  KEN:  1.0, UGA:  0.8, TZA:  0.8, RWA:  0.5,
  BDI:  0.5, MDG:  0.5, COM:  0.4, MUS:  0.3,
  // AFRICA AUSTRAL — enfriamiento / sequía
  AGO: -0.3, ZMB: -0.4, MWI: -0.4, MOZ: -0.5,
  ZWE: -0.6, BWA: -0.5, NAM: -0.5, ZAF: -0.8,
  LSO: -0.5, SWZ: -0.5,
};

const DEFAULT_ANOMALY = 0.3; // países no listados: ligero calentamiento global

const INTENSITY_LABELS = [
  { max: 10,  label: 'Normal',          desc: 'Sin anomalía significativa' },
  { max: 30,  label: 'Débil',           desc: 'Ligeras variaciones en zonas tropicales' },
  { max: 55,  label: 'Moderado',        desc: 'Impactos visibles en costa pacífica y Oceanía' },
  { max: 79,  label: 'Fuerte',          desc: 'Inundaciones en América, sequías en Asia-Pacífico' },
  { max: 100, label: 'Extraordinario',  desc: 'Evento extremo con consecuencias globales' },
];

// ─────────────────────────────────────────────
// COLORES
// ─────────────────────────────────────────────
const COLOR_STOPS = [
  [-2.0, [  0,  60, 200]],   // azul cobalto vívido
  [-1.0, [ 20, 140, 230]],   // azul brillante
  [-0.2, [110, 200, 250]],   // celeste claro
  [ 0.0, [245, 245, 245]],   // blanco neutro
  [ 0.4, [255, 250, 160]],   // amarillo pálido
  [ 1.0, [255, 210,  30]],   // amarillo-ámbar vívido
  [ 1.8, [255, 130,   0]],   // naranja intenso
  [ 2.8, [250,  30,  10]],   // rojo-naranja puro
  [ 3.8, [200,   0,  40]],   // rojo vívido
  [ 5.0, [120,   0,  80]],   // carmesí profundo
];

function anomalyToHex(val) {
  const s = COLOR_STOPS;
  if (val <= s[0][0]) return rgbToHex(s[0][1]);
  for (let i = 1; i < s.length; i++) {
    if (val <= s[i][0]) {
      const t = (val - s[i-1][0]) / (s[i][0] - s[i-1][0]);
      return rgbToHex(s[i-1][1].map((c, j) => Math.round(c + t * (s[i][1][j] - c))));
    }
  }
  return rgbToHex(s[s.length-1][1]);
}

function rgbToHex([r,g,b]) {
  return '#' + [r,g,b].map(x => x.toString(16).padStart(2,'0')).join('');
}

function anomalyToRgb(val) {
  const hex = anomalyToHex(val);
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgb(${r},${g},${b})`;
}

// ─────────────────────────────────────────────
// ESTADO
// ─────────────────────────────────────────────
let geojson    = null;
let deptKey    = null;
let multiplier = 0;

function getMultiplier(sliderVal) {
  return sliderVal / 100;
}

function getAnomaly(iso3, mult) {
  const base = (BASE_ANOMALY[iso3] !== undefined) ? BASE_ANOMALY[iso3] : DEFAULT_ANOMALY;
  return base * mult;
}

function colorizeWorld(mult) {
  return {
    ...geojson,
    features: geojson.features.map(f => {
      const iso = f.properties.ISO_A3 || f.properties.ADM0_A3 || '';
      const anomaly = getAnomaly(iso, mult);
      return {
        ...f,
        properties: {
          ...f.properties,
          _iso: iso,
          _anomaly: anomaly,
          fillColor: anomalyToHex(anomaly),
        }
      };
    })
  };
}

// ─────────────────────────────────────────────
// MAPA
// ─────────────────────────────────────────────
const map = new maplibregl.Map({
  container: 'map',
  style: {
    version: 8,
    sources: {
      'carto': {
        type: 'raster',
        tiles: ['https://basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}.png'],
        tileSize: 256,
        attribution: '© OpenStreetMap contributors, © CARTO'
      }
    },
    layers: [{ id: 'bg', type: 'raster', source: 'carto' }]
  },
  center: [10, 10],
  zoom: 1.6,
  minZoom: 1,
  maxZoom: 8,
  attributionControl: false,
});

// ─────────────────────────────────────────────
// SLIDER
// ─────────────────────────────────────────────
const TICKS = ['Normal', 'Débil', 'Moderado', 'Fuerte', 'Extraordinario'];
const ticksEl = document.getElementById('sliderTicks');
TICKS.forEach(t => {
  const s = document.createElement('span');
  s.className = 'slider-tick';
  s.textContent = t;
  ticksEl.appendChild(s);
});

const slider = document.getElementById('intensitySlider');
const badge  = document.getElementById('intensityBadge');

function getIntensityInfo(v) {
  return INTENSITY_LABELS.find(l => v <= l.max) || INTENSITY_LABELS[INTENSITY_LABELS.length - 1];
}

function updateTicks(v) {
  const info = getIntensityInfo(v);
  const tickIdx = INTENSITY_LABELS.indexOf(info);
  document.querySelectorAll('.slider-tick').forEach((el, i) => {
    el.classList.toggle('active', i === tickIdx);
  });
  badge.textContent = `${info.label} — ${info.desc}`;
}

slider.addEventListener('input', () => {
  const v = parseInt(slider.value);
  multiplier = getMultiplier(v);
  updateTicks(v);
  if (geojson && map.getSource('world')) {
    map.getSource('world').setData(colorizeWorld(multiplier));
  }
});

// Init ticks
updateTicks(0);

// ─────────────────────────────────────────────
// HOVER
// ─────────────────────────────────────────────
let hoveredId = null;

function setupHover() {
  const tooltip  = document.getElementById('tooltip');
  const ttName   = document.getElementById('ttName');
  const ttAnom   = document.getElementById('ttAnomaly');
  const ttNote   = document.getElementById('ttNote');

  map.on('mousemove', 'world-fill', (e) => {
    if (!e.features.length) return;
    map.getCanvas().style.cursor = 'pointer';
    tooltip.style.display = 'block';

    const feat = e.features[0];
    const id   = feat.id;

    if (hoveredId !== null && hoveredId !== id) {
      map.setFeatureState({ source: 'world', id: hoveredId }, { hovered: false });
    }
    hoveredId = id;
    map.setFeatureState({ source: 'world', id }, { hovered: true });

    const name    = feat.properties.NAME || feat.properties.ADMIN || feat.properties.name || '—';
    const anomaly = feat.properties._anomaly ?? 0;
    const sign    = anomaly > 0 ? '+' : '';
    const color   = anomalyToRgb(anomaly);
    const info    = getIntensityInfo(parseInt(slider.value));
    const note    = anomaly > 0.2
      ? 'Temperatura sobre el promedio histórico'
      : anomaly < -0.2
        ? 'Temperatura bajo el promedio histórico'
        : 'Sin variación significativa';

    ttName.textContent  = name;
    ttAnom.textContent  = multiplier === 0 ? '0.0°C' : `${sign}${anomaly.toFixed(1)}°C`;
    ttAnom.style.color  = color;
    ttNote.textContent  = note;
  });

  map.on('mouseleave', 'world-fill', () => {
    map.getCanvas().style.cursor = '';
    tooltip.style.display = 'none';
    if (hoveredId !== null) {
      map.setFeatureState({ source: 'world', id: hoveredId }, { hovered: false });
      hoveredId = null;
    }
  });
}

// ─────────────────────────────────────────────
// CARGA
// ─────────────────────────────────────────────
map.on('load', async () => {
  try {
    const res = await fetch(
      'https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson'
    );
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    geojson = await res.json();

    map.addSource('world', {
      type: 'geojson',
      data: colorizeWorld(multiplier),
      generateId: true,
    });

    map.addLayer({
      id: 'world-fill',
      type: 'fill',
      source: 'world',
      paint: {
        'fill-color': ['get', 'fillColor'],
        'fill-opacity': [
          'case',
          ['boolean', ['feature-state', 'hovered'], false], 1.0,
          0.92
        ]
      }
    });

    map.addLayer({
      id: 'world-outline',
      type: 'line',
      source: 'world',
      paint: { 'line-color': '#0d1117', 'line-width': 0.5 }
    });

    map.addLayer({
      id: 'world-outline-hover',
      type: 'line',
      source: 'world',
      paint: {
        'line-color': '#ffffff',
        'line-width': ['case', ['boolean', ['feature-state', 'hovered'], false], 1.5, 0]
      }
    });

    document.getElementById('loading').style.display = 'none';
    setupHover();

  } catch (err) {
    document.getElementById('loading').innerHTML = `
      <div style="color:#e05c2a;text-align:center;padding:20px;font-family:sans-serif;">
        Error al cargar datos.<br>
        <small style="color:#6a6070">${err.message}</small>
      </div>`;
    console.error(err);
  }
});
</script>
</body>
</html>
