<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>El Niño — Globo 3D</title>
  <script src="https://unpkg.com/globe.gl@2.27.0/dist/globe.gl.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', serif;
      background: #04080f;
      color: #e8e0d5;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── HEADER ── */
    header {
      padding: 16px 40px 14px;
      border-bottom: 1px solid #141c2e;
      background: rgba(4, 8, 15, 0.97);
      z-index: 10;
      flex-shrink: 0;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 13px;
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: normal;
      letter-spacing: 0.02em;
      color: #f0e8df;
    }

    .intensity-badge {
      font-family: sans-serif;
      font-size: 0.78rem;
      color: #e09070;
      background: #1a1020;
      border: 1px solid #3a2030;
      padding: 3px 10px;
      border-radius: 12px;
    }

    .slider-wrap { display: flex; flex-direction: column; gap: 6px; }

    .slider-track-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .slider-label {
      font-family: sans-serif;
      font-size: 0.72rem;
      color: #5a5060;
      white-space: nowrap;
      flex-shrink: 0;
    }

    input[type="range"] {
      -webkit-appearance: none;
      flex: 1;
      height: 4px;
      border-radius: 2px;
      background: linear-gradient(to right,
        #003cc8 0%, #148ce6 15%,
        #f5f5f5 35%,
        #ffd21e 52%, #ff8200 65%, #fa1e0a 80%, #780050 100%
      );
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: #fff;
      border: 2px solid #e05c2a;
      box-shadow: 0 0 8px rgba(224,92,42,0.6);
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      box-shadow: 0 0 16px rgba(224,92,42,0.9);
    }

    .slider-ticks {
      display: flex;
      padding: 0 30px 0 110px;
      justify-content: space-between;
    }

    .slider-tick {
      font-family: sans-serif;
      font-size: 0.65rem;
      color: #2a2535;
      text-align: center;
      flex: 1;
      transition: color 0.2s;
    }
    .slider-tick.active { color: #b09080; }

    /* ── GLOBO ── */
    #globe-wrapper {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    #globe-container {
      position: absolute;
      inset: 0;
      z-index: 1;
    }

    /* ── TOOLTIP ── */
    #tooltip {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(4, 8, 15, 0.92);
      border: 1px solid #1e2a3e;
      border-radius: 8px;
      padding: 14px 18px;
      z-index: 20;
      min-width: 195px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      backdrop-filter: blur(6px);
    }

    #tooltip.visible { opacity: 1; }

    #tooltip .t-name    { font-size: 0.9rem; color: #f0e8df; margin-bottom: 2px; }
    #tooltip .t-country { font-family: sans-serif; font-size: 0.68rem; color: #4a5568; margin-bottom: 6px; }
    #tooltip .t-anomaly { font-size: 1.6rem; font-family: sans-serif; font-weight: 700; }
    #tooltip .t-note    { font-size: 0.72rem; font-family: sans-serif; color: #6a7080; margin-top: 4px; line-height: 1.4; }

    /* ── LEYENDA ── */
    #legend {
      position: absolute;
      bottom: 68px;
      right: 20px;
      background: rgba(4, 8, 15, 0.88);
      border: 1px solid #1e2a3e;
      border-radius: 8px;
      padding: 12px 14px;
      z-index: 20;
      width: 200px;
      backdrop-filter: blur(6px);
    }

    #legend .leg-title {
      font-family: sans-serif;
      font-size: 0.63rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #5a6070;
      margin-bottom: 8px;
    }

    .leg-bar {
      height: 10px;
      border-radius: 3px;
      background: linear-gradient(to right,
        #003cc8, #148ce6, #6ec8fa, #f5f5f5,
        #fffaa0, #ffd21e, #ff8200, #fa1e0a, #c80028, #780050
      );
      margin-bottom: 4px;
    }

    .leg-labels {
      display: flex;
      justify-content: space-between;
      font-family: sans-serif;
      font-size: 0.62rem;
      color: #5a6070;
    }

    /* ── BARRA INFERIOR ── */
    #bottom-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 52px;
      background: rgba(4, 8, 15, 0.92);
      border-top: 1px solid #141c2e;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      z-index: 20;
      backdrop-filter: blur(6px);
    }

    .bar-section {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
    }

    .bar-section.center {
      justify-content: center;
      gap: 10px;
    }

    .bar-section.right {
      justify-content: flex-end;
    }

    .ctrl-btn {
      background: rgba(4,8,15,0.6);
      border: 1px solid #1e2a3e;
      border-radius: 6px;
      padding: 6px 13px;
      font-family: sans-serif;
      font-size: 0.72rem;
      color: #7a8090;
      cursor: pointer;
      transition: all 0.2s;
    }

    .ctrl-btn:hover { color: #f0e8df; border-color: #3a4a6a; }
    .ctrl-btn.active { color: #e09070; border-color: #e05c2a; }

    .nav-arrow {
      font-size: 1.1rem;
      padding: 4px 11px;
      line-height: 1;
    }

    .story-dots {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .story-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #1e2a3e;
      cursor: pointer;
      transition: all 0.25s ease;
      border: 1px solid #2a3a4e;
      flex-shrink: 0;
    }

    .story-dot:hover { background: #3a4a6a; }

    .story-dot.active {
      background: #e09070;
      border-color: #e05c2a;
      width: 18px;
      border-radius: 3px;
    }

    .bar-label {
      font-family: sans-serif;
      font-size: 0.68rem;
      color: #3a4050;
      white-space: nowrap;
    }

    /* ── POPUP DE HISTORIA ── */
    #story-popup {
      position: absolute;
      bottom: 68px;
      left: 20px;
      width: 295px;
      background: rgba(4, 8, 15, 0.96);
      border: 1px solid #1e2a3e;
      border-radius: 10px;
      padding: 18px 20px 14px;
      z-index: 25;
      backdrop-filter: blur(10px);
      opacity: 0;
      pointer-events: none;
      transform: translateY(10px);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    #story-popup.visible {
      opacity: 1;
      pointer-events: all;
      transform: translateY(0);
    }

    .popup-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 12px;
    }

    .popup-emoji {
      font-size: 1.9rem;
      line-height: 1;
      flex-shrink: 0;
    }

    .popup-meta { flex: 1; }

    .popup-person {
      font-size: 0.92rem;
      color: #f0e8df;
      line-height: 1.3;
    }

    .popup-location {
      font-family: sans-serif;
      font-size: 0.70rem;
      color: #5a6070;
      margin-top: 3px;
    }

    .popup-close {
      background: none;
      border: none;
      color: #2a3040;
      font-size: 1.3rem;
      cursor: pointer;
      line-height: 1;
      transition: color 0.2s;
      padding: 0;
      flex-shrink: 0;
    }

    .popup-close:hover { color: #f0e8df; }

    .popup-impact {
      font-family: sans-serif;
      font-size: 0.76rem;
      font-weight: 700;
      margin-bottom: 10px;
      letter-spacing: 0.02em;
    }

    .popup-divider {
      height: 1px;
      background: #141c2e;
      margin: 10px 0;
    }

    .popup-story {
      font-size: 0.80rem;
      line-height: 1.6;
      color: #8a8878;
      margin-bottom: 14px;
    }

    .popup-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid #141c2e;
      padding-top: 11px;
    }

    .popup-nav-btn {
      background: none;
      border: 1px solid #1e2a3e;
      border-radius: 4px;
      padding: 4px 10px;
      font-family: sans-serif;
      font-size: 0.68rem;
      color: #5a6070;
      cursor: pointer;
      transition: all 0.2s;
    }

    .popup-nav-btn:hover { color: #f0e8df; border-color: #3a4a6a; }

    .popup-counter {
      font-family: sans-serif;
      font-size: 0.65rem;
      color: #2a3040;
    }

    /* ── MARCADORES EN EL GLOBO ── */
    .story-marker {
      cursor: pointer;
      position: relative;
      width: 24px;
      height: 24px;
      transform: translate(-50%, -50%);
      pointer-events: auto;
    }

    .marker-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 2;
      border: 1.5px solid rgba(255,255,255,0.3);
      box-shadow: 0 0 6px rgba(255,255,255,0.4);
      transition: transform 0.2s;
    }

    .story-marker:hover .marker-dot {
      transform: translate(-50%, -50%) scale(1.4);
    }

    .marker-pulse {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      position: absolute;
      top: 0; left: 0;
      border: 1.5px solid rgba(255,255,255,0.5);
      animation: mpulse 2.2s ease-out infinite;
    }

    .marker-pulse2 {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      position: absolute;
      top: 0; left: 0;
      border: 1px solid rgba(255,255,255,0.3);
      animation: mpulse 2.2s ease-out infinite 1.1s;
    }

    @keyframes mpulse {
      0%   { transform: scale(0.4); opacity: 0.9; }
      100% { transform: scale(1.8); opacity: 0; }
    }

    /* ── SPINNER — hijo de #globe-wrapper, no de #globe-container ── */
    #loading {
      position: absolute;
      inset: 0;
      background: #04080f;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      flex-direction: column;
      gap: 20px;
      transition: opacity 0.6s;
    }

    #loading.fadeout { opacity: 0; pointer-events: none; }

    .loading-globe {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #1a3a6a, #040c1e);
      box-shadow: 0 0 30px rgba(40,100,255,0.3), inset 0 0 20px rgba(0,0,0,0.5);
      animation: pulse 2s ease-in-out infinite;
      position: relative;
      overflow: hidden;
    }

    .loading-globe::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1.5px solid rgba(60,120,255,0.3);
      animation: spin 3s linear infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 20px rgba(40,100,255,0.2); }
      50%       { box-shadow: 0 0 40px rgba(40,100,255,0.5); }
    }

    .loading-text {
      font-family: sans-serif;
      font-size: 0.82rem;
      color: #5a6070;
      letter-spacing: 0.05em;
    }

    .loading-step {
      font-family: sans-serif;
      font-size: 0.68rem;
      color: #3a4050;
      margin-top: -10px;
    }

    .loading-bar-wrap {
      width: 160px;
      height: 2px;
      background: #141c2e;
      border-radius: 2px;
      overflow: hidden;
    }

    .loading-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(to right, #1a50c0, #e05c2a);
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>Fenómeno El Niño — Impacto Global de Temperatura</h1>
    <span class="intensity-badge" id="intensityBadge">Normal — sin anomalía</span>
  </div>
  <div class="slider-wrap">
    <div class="slider-track-wrap">
      <span class="slider-label">Temperatura normal</span>
      <input type="range" id="intensitySlider" min="0" max="100" value="0" step="1" />
      <span class="slider-label">El Niño extraordinario</span>
    </div>
    <div class="slider-ticks" id="sliderTicks"></div>
  </div>
</header>

<div id="globe-wrapper">
  <!-- Canvas del globo (Globe.gl lo controla exclusivamente) -->
  <div id="globe-container"></div>

  <!-- Loading -->
  <div id="loading">
    <div class="loading-globe"></div>
    <div class="loading-text">Fenómeno El Niño</div>
    <div class="loading-bar-wrap"><div class="loading-bar" id="loadingBar"></div></div>
    <div class="loading-step" id="loadingStep">Descargando datos geográficos…</div>
  </div>

  <!-- Tooltip hover provincia/país -->
  <div id="tooltip">
    <div class="t-name"    id="ttName">—</div>
    <div class="t-country" id="ttCountry">—</div>
    <div class="t-anomaly" id="ttAnomaly">—</div>
    <div class="t-note"    id="ttNote">—</div>
  </div>

  <!-- Leyenda -->
  <div id="legend">
    <div class="leg-title">Anomalía de temperatura (°C)</div>
    <div class="leg-bar"></div>
    <div class="leg-labels">
      <span>−2</span><span>0</span><span>+2</span><span>+4</span><span>+5</span>
    </div>
  </div>

  <!-- Popup de historia personal -->
  <div id="story-popup">
    <div class="popup-header">
      <div class="popup-emoji" id="popupEmoji">👤</div>
      <div class="popup-meta">
        <div class="popup-person"   id="popupPerson">—</div>
        <div class="popup-location" id="popupLocation">—</div>
      </div>
      <button class="popup-close" onclick="closeStory()">×</button>
    </div>
    <div class="popup-impact" id="popupImpact">—</div>
    <div class="popup-divider"></div>
    <div class="popup-story" id="popupStory">—</div>
    <div class="popup-nav">
      <button class="popup-nav-btn" id="popupPrev">← Anterior</button>
      <span class="popup-counter" id="popupCounter">1 / 6</span>
      <button class="popup-nav-btn" id="popupNext">Siguiente →</button>
    </div>
  </div>

  <!-- Barra inferior -->
  <div id="bottom-bar">
    <div class="bar-section">
      <button class="ctrl-btn" id="rotateBtn">⟳ Rotar</button>
      <span class="bar-label">La altura representa la magnitud de la anomalía</span>
    </div>
    <div class="bar-section center">
      <button class="ctrl-btn nav-arrow" id="prevStory">‹</button>
      <div id="storyDots" class="story-dots"></div>
      <button class="ctrl-btn nav-arrow" id="nextStory">›</button>
    </div>
    <div class="bar-section right">
      <!-- espacio para balance visual -->
    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
// HISTORIAS PERSONALES
// ─────────────────────────────────────────────
const STORIES = [

// ─────────────────────────────────────────────
// DATOS DE TEMPERATURA
// ─────────────────────────────────────────────
const BASE_ANOMALY = {
  PER:  4.5, ECU:  3.5, COL:  2.0, CHL:  1.5,
  BOL:  0.8, VEN:  1.0, BRA:  1.8, ARG:  0.8,
  URY:  0.6, PRY:  0.5, GUY:  0.7, SUR:  0.7,
  MEX:  1.2, GTM:  1.0, BLZ:  0.8, HND:  1.0,
  SLV:  1.0, NIC:  1.0, CRI:  0.8, PAN:  0.8,
  CUB:  0.5, DOM:  0.5, JAM:  0.5, HTI:  0.5,
  TTO:  0.6, BRB:  0.5,
  USA:  0.8, CAN:  0.5, GRL:  0.3,
  GBR:  0.4, IRL:  0.4, FRA:  0.3, ESP:  0.5,
  PRT:  0.6, DEU:  0.3, NLD:  0.3, BEL:  0.3,
  CHE:  0.3, AUT:  0.3, ITA:  0.4, GRC:  0.4,
  NOR:  0.4, SWE:  0.3, FIN:  0.3, DNK:  0.3,
  POL:  0.3, CZE:  0.3, HUN:  0.3, ROU:  0.3,
  UKR:  0.2, BLR:  0.2, RUS:  0.3,
  TUR:  0.3, IRQ:  0.4, IRN:  0.3, SAU:  0.6,
  YEM:  0.6, OMN:  0.5, ARE:  0.5, QAT:  0.5,
  KWT:  0.5, JOR:  0.4, ISR:  0.3, PAK: -0.2,
  IND: -0.4, BGD: -0.3, LKA: -0.4, NPL: -0.2,
  CHN:  0.3, JPN:  0.2, KOR:  0.2, MNG:  0.2,
  MMR: -0.4, THA: -0.5, VNM: -0.5, KHM: -0.5,
  LAO: -0.4, MYS: -0.8, SGP: -0.6, IDN: -1.2,
  PHL: -1.0, TLS: -1.0,
  AUS: -1.5, PNG: -1.2, NZL: -0.3, FJI: -0.5,
  MAR:  0.4, DZA:  0.3, EGY:  0.4, SDN:  0.8,
  NGA:  0.5, CMR:  0.4, COD:  0.3, GAB:  0.3,
  ETH:  1.5, SOM:  1.2, KEN:  1.0, TZA:  0.8,
  UGA:  0.8, MDG:  0.5,
  AGO: -0.3, ZMB: -0.4, MOZ: -0.5, ZWE: -0.6,
  BWA: -0.5, NAM: -0.5, ZAF: -0.8,
};
const DEFAULT_ANOMALY = 0.3;

const INTENSITY_LABELS = [
  { max: 10,  label: 'Normal',         desc: 'Sin anomalía significativa' },
  { max: 30,  label: 'Débil',          desc: 'Ligeras variaciones en zonas tropicales' },
  { max: 55,  label: 'Moderado',       desc: 'Impactos visibles en costa pacífica y Oceanía' },
  { max: 79,  label: 'Fuerte',         desc: 'Inundaciones en América, sequías en Asia-Pacífico' },
  { max: 100, label: 'Extraordinario', desc: 'Evento extremo con consecuencias globales' },
];

// ─────────────────────────────────────────────
// COLORES
// ─────────────────────────────────────────────
const COLOR_STOPS = [
  [-2.0, [  0,  60, 200]],
  [-1.0, [ 20, 140, 230]],
  [-0.2, [110, 200, 250]],
  [ 0.0, [245, 245, 245]],
  [ 0.4, [255, 250, 160]],
  [ 1.0, [255, 210,  30]],
  [ 1.8, [255, 130,   0]],
  [ 2.8, [250,  30,  10]],
  [ 3.8, [200,   0,  40]],
  [ 5.0, [120,   0,  80]],
];

function anomalyToHex(val) {
  const s = COLOR_STOPS;
  if (val <= s[0][0]) return toHex(s[0][1]);
  for (let i = 1; i < s.length; i++) {
    if (val <= s[i][0]) {
      const t = (val - s[i-1][0]) / (s[i][0] - s[i-1][0]);
      return toHex(s[i-1][1].map((c,j) => Math.round(c + t*(s[i][1][j]-c))));
    }
  }
  return toHex(s.at(-1)[1]);
}

function toHex([r,g,b]) {
  return '#' + [r,g,b].map(x => x.toString(16).padStart(2,'0')).join('');
}

function getAnomaly(iso, mult) {
  return (BASE_ANOMALY[iso] ?? DEFAULT_ANOMALY) * mult;
}

// ─────────────────────────────────────────────
// ESTADO
// ─────────────────────────────────────────────
let geojson         = null;
let multiplier      = 0;
let world           = null;
let autoRotating    = false;
let currentStoryIdx = -1;

// Natural Earth 50m admin-1 — resolución de código de país ISO
// Fallback por nombre por si adm0_a3 difiere del estándar ISO
const NAME_TO_ISO = {
  'Peru':'PER','Brazil':'BRA','Colombia':'COL','Ecuador':'ECU',
  'Chile':'CHL','Bolivia':'BOL','Venezuela':'VEN','Argentina':'ARG',
  'Uruguay':'URY','Paraguay':'PRY','Guyana':'GUY','Suriname':'SUR',
  'Mexico':'MEX','Guatemala':'GTM','Belize':'BLZ','Honduras':'HND',
  'El Salvador':'SLV','Nicaragua':'NIC','Costa Rica':'CRI','Panama':'PAN',
  'Cuba':'CUB','Dominican Republic':'DOM','Jamaica':'JAM','Haiti':'HTI',
  'Trinidad and Tobago':'TTO','Barbados':'BRB',
  'United States of America':'USA','Canada':'CAN','Greenland':'GRL',
  'United Kingdom':'GBR','Ireland':'IRL','France':'FRA','Spain':'ESP',
  'Portugal':'PRT','Germany':'DEU','Netherlands':'NLD','Belgium':'BEL',
  'Switzerland':'CHE','Austria':'AUT','Italy':'ITA','Greece':'GRC',
  'Norway':'NOR','Sweden':'SWE','Finland':'FIN','Denmark':'DNK',
  'Poland':'POL','Czech Republic':'CZE','Czechia':'CZE','Hungary':'HUN',
  'Romania':'ROU','Ukraine':'UKR','Belarus':'BLR','Russia':'RUS',
  'Turkey':'TUR','Iraq':'IRQ','Iran':'IRN','Saudi Arabia':'SAU',
  'Yemen':'YEM','Oman':'OMN','United Arab Emirates':'ARE','Qatar':'QAT',
  'Kuwait':'KWT','Jordan':'JOR','Israel':'ISR','Pakistan':'PAK',
  'India':'IND','Bangladesh':'BGD','Sri Lanka':'LKA','Nepal':'NPL',
  'China':'CHN','Japan':'JPN','South Korea':'KOR','Mongolia':'MNG',
  'Myanmar':'MMR','Thailand':'THA','Vietnam':'VNM','Cambodia':'KHM',
  'Laos':'LAO','Malaysia':'MYS','Singapore':'SGP','Indonesia':'IDN',
  'Philippines':'PHL','East Timor':'TLS','Timor-Leste':'TLS',
  'Australia':'AUS','Papua New Guinea':'PNG','New Zealand':'NZL','Fiji':'FJI',
  'Morocco':'MAR','Algeria':'DZA','Egypt':'EGY','Sudan':'SDN',
  'Nigeria':'NGA','Cameroon':'CMR',
  'Democratic Republic of the Congo':'COD','Congo, DRC':'COD',
  'Gabon':'GAB','Ethiopia':'ETH','Somalia':'SOM','Kenya':'KEN',
  'Tanzania':'TZA','Uganda':'UGA','Madagascar':'MDG','Angola':'AGO',
  'Zambia':'ZMB','Mozambique':'MOZ','Zimbabwe':'ZWE','Botswana':'BWA',
  'Namibia':'NAM','South Africa':'ZAF',
};

function isoOf(f) {
  if (!f || !f.properties) return '';
  const p = f.properties;
  // Normalizar: trim + uppercase para evitar diferencias de case o espacios
  const raw = (p.adm0_a3 || p.adm0_a3_is || p.adm0_a3_us ||
               p.ADM0_A3  || p.gu_a3      || p.sov_a3     || '').trim().toUpperCase();
  if (raw && raw !== '-99' && raw !== '-9' && BASE_ANOMALY[raw] !== undefined) return raw;
  // Fallback por nombre de país (campo 'admin' en Natural Earth siempre presente)
  const admin = (p.admin || p.ADMIN || p.adm0_name || '').trim();
  return NAME_TO_ISO[admin] || raw || '';
}

// nameOf y countryOf manejan tanto admin-1 (minúsculas) como admin-0 (mayúsculas)
function nameOf(f)    {
  return f.properties.name_en || f.properties.name    ||
         f.properties.NAME    || f.properties.ADMIN   || '—';
}
function countryOf(f) {
  return f.properties.admin   || f.properties.adm0_name ||
         f.properties.ADMIN   || f.properties.NAME    || '';
}

function capColor(f) {
  const a = getAnomaly(isoOf(f), multiplier);
  return anomalyToHex(a);
}

function altitude(f) {
  const a = Math.abs(getAnomaly(isoOf(f), multiplier));
  return 0.004 + a * 0.012;
}

// ─────────────────────────────────────────────
// LOADING
// ─────────────────────────────────────────────
function setLoadingStep(text, pct) {
  const step = document.getElementById('loadingStep');
  const bar  = document.getElementById('loadingBar');
  if (step) step.textContent = text;
  if (bar)  bar.style.width  = pct + '%';
}

function hideLoading() {
  const el = document.getElementById('loading');
  if (!el) return;
  el.classList.add('fadeout');
  setTimeout(() => el.remove(), 700);
}

// ─────────────────────────────────────────────
// TOOLTIP HOVER PAÍS
// ─────────────────────────────────────────────
const tooltip   = document.getElementById('tooltip');
const ttName    = document.getElementById('ttName');
const ttCountry = document.getElementById('ttCountry');
const ttAnom    = document.getElementById('ttAnomaly');
const ttNote    = document.getElementById('ttNote');

function handleHover(f) {
  if (!f) { tooltip.classList.remove('visible'); return; }
  const province = nameOf(f);
  const country  = countryOf(f);
  const iso      = isoOf(f);
  const anomaly  = getAnomaly(iso, multiplier);
  const sign     = anomaly > 0 ? '+' : '';
  const color    = anomalyToHex(anomaly);
  const note     = anomaly > 0.2
    ? 'Temperatura sobre el promedio histórico'
    : anomaly < -0.2
      ? 'Temperatura bajo el promedio histórico'
      : 'Sin variación significativa';
  ttName.textContent    = province;
  ttCountry.textContent = country;
  ttAnom.textContent    = `${sign}${anomaly.toFixed(1)}°C`;
  ttAnom.style.color    = color;
  ttNote.textContent    = note;
  tooltip.classList.add('visible');
}

// ─────────────────────────────────────────────
// HISTORIAS — POPUP + FLY-TO
// ─────────────────────────────────────────────
function openStory(idx) {
  currentStoryIdx = idx;
  const s = STORIES[idx];

  // Fly-to: pausa rotación y vuela al punto
  if (world) {
    autoRotating = false;
    world.controls().autoRotate = false;
    const btn = document.getElementById('rotateBtn');
    btn.classList.remove('active');
    btn.textContent = '⟳ Rotar';
    world.pointOfView({ lat: s.lat, lng: s.lng, altitude: 1.6 }, 1400);
  }

  // Actualiza popup
  document.getElementById('popupEmoji').textContent    = s.emoji;
  document.getElementById('popupPerson').textContent   = s.person;
  document.getElementById('popupLocation').textContent = s.location;
  const impactEl = document.getElementById('popupImpact');
  impactEl.textContent  = s.impact;
  impactEl.style.color  = s.markerColor;
  document.getElementById('popupStory').textContent    = s.story;
  document.getElementById('popupCounter').textContent  = `${idx + 1} / ${STORIES.length}`;

  // Actualiza dots
  document.querySelectorAll('.story-dot').forEach((dot, i) => {
    dot.classList.toggle('active', i === idx);
  });

  // Muestra popup
  document.getElementById('story-popup').classList.add('visible');
}

function closeStory() {
  document.getElementById('story-popup').classList.remove('visible');
  currentStoryIdx = -1;
  document.querySelectorAll('.story-dot').forEach(d => d.classList.remove('active'));
}

function prevStory() {
  const idx = currentStoryIdx < 0 ? 0 : (currentStoryIdx - 1 + STORIES.length) % STORIES.length;
  openStory(idx);
}

function nextStory() {
  const idx = currentStoryIdx < 0 ? 0 : (currentStoryIdx + 1) % STORIES.length;
  openStory(idx);
}

// ─────────────────────────────────────────────
// GLOBO
// ─────────────────────────────────────────────
function initGlobe(data) {
  geojson = data;
  setLoadingStep('Inicializando globo 3D…', 70);

  world = Globe({ animateIn: true, waitForGlobeReady: true })
    (document.getElementById('globe-container'))
    .backgroundColor('#04080f')
    .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-dark.jpg')
    .showAtmosphere(true)
    .atmosphereColor('#1a50c0')
    .atmosphereAltitude(0.14)
    // Polígonos de países
    .polygonsData(geojson.features)
    .polygonCapColor(capColor)
    .polygonSideColor(() => 'rgba(4,8,15,0.4)')
    .polygonStrokeColor(() => 'rgba(4,8,15,0.7)')   // bordes suaves entre provincias
    .polygonAltitude(() => 0.004)
    .onPolygonHover(handleHover)
    .polygonsTransitionDuration(500)
    // Marcadores HTML de historias
    .htmlElementsData(STORIES)
    .htmlLat('lat')
    .htmlLng('lng')
    .htmlAltitude(0.016)
    .htmlElement(d => {
      const el = document.createElement('div');
      el.className = 'story-marker';
      el.innerHTML = `
        <div class="marker-pulse"  style="border-color:${d.markerColor}88"></div>
        <div class="marker-pulse2" style="border-color:${d.markerColor}55"></div>
        <div class="marker-dot"   style="background:${d.markerColor}"></div>
      `;
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        openStory(STORIES.indexOf(d));
      });
      return el;
    })
    // Listo
    .onGlobeReady(() => {
      setLoadingStep('¡Listo!', 100);
      setTimeout(hideLoading, 300);
      initStoryNav();
    });

  const ctrl = world.controls();
  ctrl.autoRotate      = false;   // Sin rotación por defecto
  ctrl.autoRotateSpeed = 0.5;
  ctrl.enableDamping   = true;
  ctrl.dampingFactor   = 0.08;
  ctrl.enablePan       = false;
  ctrl.minDistance     = 130;
  ctrl.maxDistance     = 500;
}

function updateGlobe() {
  if (!world) return;
  world
    .polygonCapColor(capColor)
    .polygonAltitude(altitude)
    .polygonsTransitionDuration(400);
}

// ─────────────────────────────────────────────
// NAV DOTS + BOTONES
// ─────────────────────────────────────────────
function initStoryNav() {
  const dotsEl = document.getElementById('storyDots');
  STORIES.forEach((s, i) => {
    const dot = document.createElement('div');
    dot.className = 'story-dot';
    dot.title = s.location;
    dot.style.setProperty('--color', s.markerColor);
    dot.addEventListener('click', () => openStory(i));
    dotsEl.appendChild(dot);
  });

  document.getElementById('prevStory').addEventListener('click', prevStory);
  document.getElementById('nextStory').addEventListener('click', nextStory);
  document.getElementById('popupPrev').addEventListener('click', prevStory);
  document.getElementById('popupNext').addEventListener('click', nextStory);
}

// ─────────────────────────────────────────────
// SLIDER
// ─────────────────────────────────────────────
const TICKS   = ['Normal', 'Débil', 'Moderado', 'Fuerte', 'Extraordinario'];
const badge   = document.getElementById('intensityBadge');
const slider  = document.getElementById('intensitySlider');
const ticksEl = document.getElementById('sliderTicks');

TICKS.forEach(t => {
  const s = document.createElement('span');
  s.className = 'slider-tick';
  s.textContent = t;
  ticksEl.appendChild(s);
});

function getIntensityInfo(v) {
  return INTENSITY_LABELS.find(l => v <= l.max) || INTENSITY_LABELS.at(-1);
}

function updateSlider(v) {
  const info = getIntensityInfo(v);
  const idx  = INTENSITY_LABELS.indexOf(info);
  document.querySelectorAll('.slider-tick').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });
  badge.textContent = `${info.label} — ${info.desc}`;
  multiplier = v / 100;
  updateGlobe();
}

slider.addEventListener('input', () => updateSlider(parseInt(slider.value)));
updateSlider(0);

// ─────────────────────────────────────────────
// BOTÓN ROTAR
// ─────────────────────────────────────────────
document.getElementById('rotateBtn').addEventListener('click', function () {
  autoRotating = !autoRotating;
  if (world) world.controls().autoRotate = autoRotating;
  this.classList.toggle('active', autoRotating);
  this.textContent = autoRotating ? '⟳ Rotando' : '⟳ Rotar';
});

// ─────────────────────────────────────────────
// CARGA
// ─────────────────────────────────────────────
// Carga híbrida:
//   admin-1 50m → provincias/estados (cobertura parcial, ~5 MB)
//   admin-0 110m → países completos  (~900 KB, fallback para lo que admin-1 no cubre)
const GEO_ADM1 = 'https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_50m_admin_1_states_provinces.geojson';
const GEO_ADM0 = 'https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_110m_admin_0_countries.geojson';

setLoadingStep('Descargando datos geográficos…', 10);

Promise.all([
  fetch(GEO_ADM1).then(r => { if (!r.ok) throw new Error(`ADM1 HTTP ${r.status}`); return r.json(); }),
  fetch(GEO_ADM0).then(r => { if (!r.ok) throw new Error(`ADM0 HTTP ${r.status}`); return r.json(); }),
])
.then(([adm1, adm0]) => {
  setLoadingStep('Combinando provincias y países…', 55);

  // ISOs cubiertos por admin-1
  const covered = new Set(
    adm1.features.map(f => {
      const p = f.properties;
      return (p.adm0_a3 || p.ADM0_A3 || p.gu_a3 || '').trim().toUpperCase();
    }).filter(Boolean)
  );

  // Admin-0: solo países que NO están cubiertos por admin-1
  const fallback = adm0.features.filter(f => {
    const p = f.properties;
    const iso = (p.ADM0_A3 || p.ISO_A3 || '').trim().toUpperCase();
    return iso && !covered.has(iso);
  });

  console.log(`[Niño] Provincias admin-1: ${adm1.features.length} | Fallback admin-0: ${fallback.length} países`);

  const combined = {
    type: 'FeatureCollection',
    features: [...adm1.features, ...fallback],
  };

  setTimeout(() => initGlobe(combined), 50);
})
.catch(err => {
  document.getElementById('loading').innerHTML = `
    <div style="color:#e05c2a;text-align:center;padding:24px;font-family:sans-serif;">
      Error al cargar datos.<br>
      <small style="color:#5a6070">${err.message}</small>
    </div>`;
});
</script>
